# XcodeGen project configuration.
# GitHub Actions generates the .xcodeproj from this file before building.

name: ConvenienceStoreBoss
options:
  bundleIdPrefix: com.conveniencestore
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configs:
  Debug: debug
  Release: release

targets:
  ConvenienceStoreBoss:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - ".github/**"
          - ".git/**"
          - "project.yml"
          - "README.md"
          - "nul"
          - "*.xcodeproj"
          - "build/**"
          - "DerivedData/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.conveniencestore.boss
        PRODUCT_NAME: ConvenienceStoreBoss
        INFOPLIST_KEY_CFBundleDisplayName: "Convenience Store Boss"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
