name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.3.app
        continue-on-error: true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show working directory
        run: ls -la

      - name: Install XcodeGen via Homebrew
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          PROJECT_DIR=$(find . -name "project.yml" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: project.yml not found"
            exit 1
          fi
          echo "Project dir: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          xcodegen generate
          echo "---- Generated project files ----"
          ls -la

      - name: Find Xcode project and workspace
        run: |
          echo "==== xcodeproj ===="
          find . -name "*.xcodeproj"
          echo "==== xcworkspace ===="
          find . -name "*.xcworkspace"

      - name: Build iOS App unsigned
        run: |
          set -e
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then
            echo "ERROR: .xcodeproj not found"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          cd "$PROJECT_DIR"

          echo "==== Building $PROJECT_NAME ===="
          echo "Available schemes:"
          xcodebuild -project "$PROJECT_NAME.xcodeproj" -list

          xcodebuild \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build/DerivedData \
            clean build

      - name: Locate .app output
        run: |
          echo "==== .app outputs ===="
          find . -name "*.app" -not -path "*/node_modules/*"
          APP_PATH=$(find . -path "*/build/DerivedData/Build/Products/*" -name "*.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_ENV"

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH="${{ env.app_path }}"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found; cannot package IPA"
            exit 1
          fi
          WORK_DIR="$GITHUB_WORKSPACE/artifact"
          mkdir -p "$WORK_DIR"
          rm -rf "$WORK_DIR/Payload"
          mkdir -p "$WORK_DIR/Payload"
          cp -R "$APP_PATH" "$WORK_DIR/Payload/"
          cd "$WORK_DIR"
          zip -r -q ConvenienceStoreBoss-unsigned.ipa Payload
          echo "==== IPA contents ===="
          unzip -l ConvenienceStoreBoss-unsigned.ipa
          cp -R "$APP_PATH" "$WORK_DIR/"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConvenienceStoreBoss-build
          path: artifact/
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ConvenienceStoreBoss-build-logs
          path: |
            **/build/DerivedData/Logs/**
            *.log
          if-no-files-found: ignore
          retention-days: 7
