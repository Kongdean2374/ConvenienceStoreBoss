name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Ensure Xcode project exists
        run: |
          set -e
          if [ ! -d "ConvenienceStoreBoss/ConvenienceStoreBoss.xcodeproj" ]; then
            echo "ConvenienceStoreBoss.xcodeproj not found; generating it with XcodeGen."
            brew install xcodegen
            cd ConvenienceStoreBoss
            xcodegen generate
          fi

      - name: List project files
        run: |
          ls -la
          find . -name "*.xcodeproj"
          find . -name "*.xcworkspace"

      - name: Show schemes
        run: |
          xcodebuild -project ConvenienceStoreBoss/ConvenienceStoreBoss.xcodeproj -list

      - name: Build app without signing
        run: |
          xcodebuild \
            -project ConvenienceStoreBoss/ConvenienceStoreBoss.xcodeproj \
            -scheme ConvenienceStoreBoss \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Find app
        run: |
          find build -name "*.app"

      - name: Create unsigned IPA
        run: |
          set -e
          APP_PATH=$(find build -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ConvenienceStoreBoss-unsigned.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConvenienceStoreBoss-build
          path: |
            ConvenienceStoreBoss-unsigned.ipa
            build
